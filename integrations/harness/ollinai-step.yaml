# OllinAI Deployment Event — Harness CD
# Add this as a Shell Script step in your Harness pipeline after deployment
#
# Prerequisites:
# 1. Add OLLINAI_SECRET_KEY as a Harness Secret
# 2. Add OLLINAI_TENANT_ID and OLLINAI_INTEGRATION_ID as pipeline variables
# 3. Add this step after your deploy stage

# Harness Pipeline Step Configuration:
# Type: Shell Script
# Name: Notify OllinAI
# Script:

# #!/bin/bash
# PAYLOAD='{
#   "commitShas": ["<+codebase.commitSha>"],
#   "author": "<+pipeline.triggeredBy.email>",
#   "services": ["<+service.name>"],
#   "environment": "<+env.name>",
#   "deploymentTimestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
# }'
#
# SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "<+secrets.getValue('ollinai_secret_key')>" -binary | xxd -p -c 256)
#
# curl -s -X POST "https://ollin-ai.vercel.app/api/webhooks/deployments" \
#   -H "Content-Type: application/json" \
#   -H "X-OllinAI-Signature: $SIGNATURE" \
#   -H "X-OllinAI-Integration: <+variable.ollinai_tenant_id>:<+variable.ollinai_integration_id>" \
#   -d "$PAYLOAD"

# --- Alternatively, as a YAML pipeline step: ---

step:
  type: ShellScript
  name: Notify OllinAI
  identifier: notify_ollinai
  spec:
    shell: Bash
    onDelegate: true
    source:
      type: Inline
      spec:
        script: |
          PAYLOAD='{"commitShas":["<+codebase.commitSha>"],"author":"<+pipeline.triggeredBy.email>","services":["<+service.name>"],"environment":"<+env.name>","deploymentTimestamp":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}'
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "<+secrets.getValue('ollinai_secret_key')>" -binary | xxd -p -c 256)
          curl -s -X POST "https://ollin-ai.vercel.app/api/webhooks/deployments" \
            -H "Content-Type: application/json" \
            -H "X-OllinAI-Signature: $SIGNATURE" \
            -H "X-OllinAI-Integration: <+variable.ollinai_tenant_id>:<+variable.ollinai_integration_id>" \
            -d "$PAYLOAD"
  timeout: 60s
