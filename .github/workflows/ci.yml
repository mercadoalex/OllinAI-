name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Code Quality ─────────────────────────────────────────────────────────
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Security audit
        run: npm audit --audit-level=high || true

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

  # ─── Secret Scanning ──────────────────────────────────────────────────────
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Notify OllinAI ───────────────────────────────────────────────────────
  notify:
    runs-on: ubuntu-latest
    needs: [quality]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Notify OllinAI of deployment
        run: |
          PAYLOAD='{"commitShas":["${{ github.sha }}"],"author":"${{ github.actor }}","services":["ollinai-platform"],"environment":"production","deploymentTimestamp":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}'
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "${{ secrets.OLLINAI_SECRET_KEY }}" -binary | xxd -p -c 256)
          curl -s -X POST "https://ollin-ai.vercel.app/api/webhooks/deployments" \
            -H "Content-Type: application/json" \
            -H "X-OllinAI-Signature: $SIGNATURE" \
            -H "X-OllinAI-Integration: ${{ secrets.OLLINAI_TENANT_ID }}:${{ secrets.OLLINAI_INTEGRATION_ID }}" \
            -d "$PAYLOAD"
