name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Notify OllinAI
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: ollinai/integrations/github-actions/ollinai-deploy-event@v1
        with:
          api-url: "https://ollin-ai.vercel.app"
          secret-key: ${{ secrets.OLLINAI_SECRET_KEY }}
          services: "ollinai-platform"
          environment: "production"
