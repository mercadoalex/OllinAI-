# Static musl build configuration for portable binary distribution
# Produces a fully static binary with no runtime dependencies

[target.x86_64-unknown-linux-musl]
linker = "x86_64-linux-musl-gcc"
rustflags = ["-C", "target-feature=+crt-static"]

[target.aarch64-unknown-linux-musl]
linker = "aarch64-linux-musl-gcc"
rustflags = ["-C", "target-feature=+crt-static"]

# Default to musl for release builds on Linux
[build]
# Uncomment for CI builds targeting musl:
# target = "x86_64-unknown-linux-musl"
